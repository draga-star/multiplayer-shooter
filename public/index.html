<!DOCTYPE html>
<html>
<head>
  <title>Multiplayer Shooter</title>

  <!-- 🎮 GAME STYLES (IMPORTANT FIXES) -->
  <style>
    body {
        margin: 0;
        overflow: hidden;
        touch-action: none;
        background: #1e1e1e;
        font-family: Arial;
    }

    canvas {
        display: block;
        margin: 0 auto;
        background: #1e1e1e;
    }

    /* 📱 mobile buttons layering fix */
    button {
        user-select: none;
        -webkit-user-select: none;
    }
  </style>

</head>

<body>

  <!-- 🎮 GAME CANVAS -->
  <canvas id="game"></canvas>

  <!-- 🔌 SOCKET + GAME -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>

</body>
</html>
